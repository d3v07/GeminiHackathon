services:
  # --- Infrastructure ---
  temporal:
    image: temporalio/auto-setup:1.25
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      - temporal-db
    networks:
      - metropolis

  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    networks:
      - metropolis

  temporal-ui:
    image: temporalio/ui:2.31.2
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - metropolis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - metropolis

  # --- Application ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    volumes:
      - ./worker.js:/app/worker.js
      - ./workflows.js:/app/workflows.js
      - ./activities.js:/app/activities.js
      - ./lib:/app/lib
    depends_on:
      temporal:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: on-failure:5
    networks:
      - metropolis

  spawner:
    build:
      context: .
      dockerfile: Dockerfile.spawner
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    volumes:
      - ./spawn-agents.js:/app/spawn-agents.js
      - ./lib:/app/lib
    depends_on:
      worker:
        condition: service_healthy
    restart: on-failure:3
    networks:
      - metropolis

  frontend:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
      - ./orchestrator/.env.local
    depends_on:
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: on-failure:3
    networks:
      - metropolis

  bigquery-streamer:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["node", "scripts/bigquery-streamer.js"]
    env_file: .env
    volumes:
      - ./scripts:/app/scripts
    depends_on:
      - worker
    restart: on-failure:5
    networks:
      - metropolis

volumes:
  temporal-db-data:
  redis-data:

networks:
  metropolis:
    driver: bridge
