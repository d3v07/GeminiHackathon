apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: metropolis
  labels:
    app: metropolis
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metropolis
      component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: metropolis
        component: worker
    spec:
      containers:
        - name: worker
          image: gcr.io/PROJECT_ID/metropolis-worker:latest
          envFrom:
            - configMapRef:
                name: metropolis-config
            - secretRef:
                name: metropolis-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('@temporalio/client').Connection.connect({address:process.env.TEMPORAL_ADDRESS}).then(()=>process.exit(0)).catch(()=>process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('@temporalio/client').Connection.connect({address:process.env.TEMPORAL_ADDRESS}).then(()=>process.exit(0)).catch(()=>process.exit(1))"
            initialDelaySeconds: 10
            periodSeconds: 10
      terminationGracePeriodSeconds: 60
