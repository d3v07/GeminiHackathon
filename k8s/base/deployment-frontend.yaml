apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: metropolis
  labels:
    app: metropolis
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metropolis
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: metropolis
        component: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/PROJECT_ID/metropolis-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: metropolis-config
            - secretRef:
                name: metropolis-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
